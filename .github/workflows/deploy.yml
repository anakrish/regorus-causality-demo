name: Build & Deploy Causality Playground

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout regorus causality branch
        uses: actions/checkout@v4
        with:
          repository: anakrish/regorus
          ref: causality

      - name: Get source commit SHA
        id: check
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Restore cached WASM build
        uses: actions/cache@v4
        id: wasm-cache
        with:
          path: causality-demo/pkg
          key: wasm-pkg-${{ steps.check.outputs.sha }}

      - name: Install Rust toolchain
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry & build
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: bindings/wasm

      - name: Install wasm-pack
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Build WASM package
        if: steps.wasm-cache.outputs.cache-hit != 'true'
        run: ./causality-demo/build-demo.sh

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: causality-demo

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
